<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Admiral · Social Kit</title>
<style>
  @import url('../../colors_and_type.css');
  * { box-sizing: border-box; margin: 0; }
  body { background: #1a1a2e; }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" src="design-canvas.jsx"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel">

/* ============================================================
   Shared primitives — pixel texture, logo, CTA, quote, KPI
   ============================================================ */
const navy = '#030033';
const blue = '#3360FF';
const blueDeep = '#0A00CC';
const white = '#FFFFFF';
const light = '#FAFBFC';
const fgMuted = '#475467';

const Texture = ({ style }) => (
  <div style={{ position:'absolute', inset:0, pointerEvents:'none', ...style }}>
    <div style={{
      position:'absolute', inset:0,
      backgroundImage: 'radial-gradient(circle, rgba(255,255,255,0.08) 1px, transparent 1.4px)',
      backgroundSize: '12px 12px',
      maskImage: 'radial-gradient(ellipse 65% 55% at 50% 50%, #000 25%, transparent 80%)',
      WebkitMaskImage: 'radial-gradient(ellipse 65% 55% at 50% 50%, #000 25%, transparent 80%)',
    }}/>
    <div style={{
      position:'absolute', inset:0,
      background: 'radial-gradient(50% 60% at 30% 65%, rgba(51,96,255,0.3), transparent 70%)',
      filter: 'blur(10px)',
    }}/>
  </div>
);

const Logo = ({ dark, size=20 }) => (
  <img src={dark ? '../../assets/admiral-wordmark-white.png' : '../../assets/admiral-wordmark-color.png'}
       alt="Admiral" style={{ height: size, display:'block' }} />
);

const Pill = ({ children, color=blue }) => (
  <span style={{
    fontFamily:"'Plus Jakarta Sans', sans-serif", fontWeight:700,
    fontSize:11, letterSpacing:'0.12em', textTransform:'uppercase',
    color: white, background: color,
    padding:'4px 10px', borderRadius:999,
  }}>{children}</span>
);

/* ============================================================
   1 · QUOTE CARD
   ============================================================ */
const QuoteCard = ({ w, h, dark }) => (
  <div style={{ width:w, height:h, background: dark ? navy : white, position:'relative', overflow:'hidden', display:'flex', flexDirection:'column', justifyContent:'space-between', padding: w > 800 ? 64 : 48 }}>
    {dark && <Texture />}
    <div style={{ position:'relative', zIndex:2 }}>
      <Logo dark={dark} size={18} />
    </div>
    <div style={{ position:'relative', zIndex:2, flex:1, display:'flex', flexDirection:'column', justifyContent:'center', gap:20 }}>
      <p style={{ fontFamily:"'Plus Jakarta Sans', sans-serif", fontWeight:600, fontSize: w > 800 ? 32 : 24, lineHeight:1.3, letterSpacing:'-0.01em', color: dark ? white : '#161616', maxWidth: w * 0.8 }}>
        "Starboard replaced three spreadsheets, two WhatsApp groups, and a prayer."
      </p>
      <div style={{ display:'flex', alignItems:'center', gap:12 }}>
        <div style={{ width:36, height:36, borderRadius:999, background:'linear-gradient(135deg, #3360FF, #9747FF)', display:'grid', placeItems:'center', color:white, fontFamily:"'Plus Jakarta Sans'", fontWeight:700, fontSize:14 }}>JM</div>
        <div>
          <div style={{ fontFamily:"'Plus Jakarta Sans'", fontWeight:600, fontSize:14, color: dark ? white : '#161616' }}>James Moreno</div>
          <div style={{ fontSize:12, color: dark ? 'rgba(255,255,255,0.55)' : fgMuted }}>Head of Ops · Bayline Shipping</div>
        </div>
      </div>
    </div>
    <div style={{ position:'relative', zIndex:2, fontSize:11, color: dark ? 'rgba(255,255,255,0.4)' : '#98A2B3' }}>admiral.systems</div>
  </div>
);

/* ============================================================
   2 · KPI CARD
   ============================================================ */
const KpiCard = ({ w, h, dark }) => (
  <div style={{ width:w, height:h, background: dark ? navy : light, position:'relative', overflow:'hidden', display:'flex', flexDirection:'column', justifyContent:'space-between', padding: w > 800 ? 64 : 48 }}>
    {dark && <Texture />}
    <div style={{ position:'relative', zIndex:2, display:'flex', alignItems:'center', justifyContent:'space-between' }}>
      <Logo dark={dark} size={18} />
      <Pill>Fleet report</Pill>
    </div>
    <div style={{ position:'relative', zIndex:2, flex:1, display:'flex', flexDirection:'column', justifyContent:'center', gap:12 }}>
      <div style={{ fontFamily:"'IBM Plex Mono', monospace", fontWeight:500, fontSize: w > 800 ? 96 : 72, letterSpacing:'-0.02em', color: dark ? white : '#030033', lineHeight:1 }}>
        94.2<span style={{ fontFamily:"'IBM Plex Sans'", fontSize: w > 800 ? 36 : 28, color: dark ? 'rgba(255,255,255,0.55)' : fgMuted, marginLeft:8 }}>%</span>
      </div>
      <div style={{ fontFamily:"'Plus Jakarta Sans'", fontWeight:600, fontSize: w > 800 ? 22 : 18, color: dark ? 'rgba(255,255,255,0.85)' : '#161616' }}>Fleet on schedule — last 30 days</div>
      <div style={{ fontSize:14, color: dark ? 'rgba(255,255,255,0.55)' : fgMuted }}>↑ 2.1 pts vs prior period · 12 active voyages</div>
    </div>
    <div style={{ position:'relative', zIndex:2, fontSize:11, color: dark ? 'rgba(255,255,255,0.4)' : '#98A2B3' }}>admiral.systems</div>
  </div>
);

/* ============================================================
   3 · FEATURE / LAUNCH CARD
   ============================================================ */
const LaunchCard = ({ w, h, dark }) => (
  <div style={{ width:w, height:h, background: dark ? navy : white, position:'relative', overflow:'hidden', display:'flex', flexDirection:'column', justifyContent:'space-between', padding: w > 800 ? 64 : 48 }}>
    {dark && <Texture />}
    <div style={{ position:'relative', zIndex:2, display:'flex', alignItems:'center', justifyContent:'space-between' }}>
      <Logo dark={dark} size={18} />
      <Pill color="#12B76A">New</Pill>
    </div>
    <div style={{ position:'relative', zIndex:2, flex:1, display:'flex', flexDirection:'column', justifyContent:'center', gap:16 }}>
      <p style={{ fontFamily:"'Plus Jakarta Sans'", fontWeight:700, fontSize:11, letterSpacing:'0.12em', textTransform:'uppercase', color: blue }}>Starboard 2.4</p>
      <h2 style={{ fontFamily:"'Plus Jakarta Sans'", fontWeight:700, fontSize: w > 800 ? 40 : 28, lineHeight:1.15, letterSpacing:'-0.015em', color: dark ? white : '#161616', maxWidth: w * 0.75 }}>
        Voyage replays now stream port-to-port
      </h2>
      <p style={{ fontSize: w > 800 ? 18 : 15, lineHeight:1.55, color: dark ? 'rgba(255,255,255,0.72)' : fgMuted, maxWidth: w * 0.7 }}>
        Scrub any 24-hour window across the last quarter — the same shortcuts you use on the live bridge.
      </p>
    </div>
    <div style={{ position:'relative', zIndex:2, fontSize:11, color: dark ? 'rgba(255,255,255,0.4)' : '#98A2B3' }}>admiral.systems/changelog</div>
  </div>
);

/* ============================================================
   4 · CAROUSEL (cover + 2 body slides)
   ============================================================ */
const Carousel = ({ w, h }) => {
  const slides = [
    { type:'cover', title:'5 signals your fleet ops has outgrown spreadsheets', sub:'A quick diagnostic for ops leaders.' },
    { type:'body', num:'01', title:'Your ETA is always "about right"', body:'If no one knows ETA to the minute, you\u2019re flying blind. Starboard closes this gap with 30-second live tracking.' },
    { type:'body', num:'02', title:'Incidents live in email threads', body:'An incident without a timeline is a story without evidence. Structured escalation replaces the forwarded-email chain.' },
  ];
  const [idx, setIdx] = React.useState(0);
  return (
    <div style={{ width:w, height:h, background: navy, position:'relative', overflow:'hidden', cursor:'pointer' }} onClick={()=>setIdx((idx+1)%slides.length)}>
      <Texture />
      {slides[idx].type === 'cover' ? (
        <div style={{ position:'relative', zIndex:2, padding:64, display:'flex', flexDirection:'column', justifyContent:'space-between', height:'100%' }}>
          <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between' }}>
            <Logo dark size={18} />
            <Pill>Carousel · {slides.length} slides</Pill>
          </div>
          <div>
            <h2 style={{ fontFamily:"'Plus Jakarta Sans'", fontWeight:700, fontSize:36, lineHeight:1.15, color:white, maxWidth:w*0.7, marginBottom:12, letterSpacing:'-0.015em' }}>{slides[idx].title}</h2>
            <p style={{ fontSize:16, color:'rgba(255,255,255,0.65)' }}>{slides[idx].sub}</p>
          </div>
          <div style={{ display:'flex', gap:8 }}>{slides.map((_,i)=><span key={i} style={{ width: i===idx?24:8, height:8, borderRadius:999, background: i===idx?blue:'rgba(255,255,255,0.2)', transition:'width 200ms ease' }}/>)}</div>
        </div>
      ) : (
        <div style={{ position:'relative', zIndex:2, padding:64, display:'flex', flexDirection:'column', justifyContent:'space-between', height:'100%' }}>
          <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between' }}>
            <span style={{ fontFamily:"'IBM Plex Mono'", fontSize:14, color:'rgba(255,255,255,0.45)' }}>{slides[idx].num} / 0{slides.length-1}</span>
            <Logo dark size={18} />
          </div>
          <div>
            <h2 style={{ fontFamily:"'Plus Jakarta Sans'", fontWeight:700, fontSize:28, lineHeight:1.2, color:white, maxWidth:w*0.75, marginBottom:16, letterSpacing:'-0.01em' }}>{slides[idx].title}</h2>
            <p style={{ fontSize:16, lineHeight:1.6, color:'rgba(255,255,255,0.72)', maxWidth:w*0.7 }}>{slides[idx].body}</p>
          </div>
          <div style={{ display:'flex', gap:8 }}>{slides.map((_,i)=><span key={i} style={{ width: i===idx?24:8, height:8, borderRadius:999, background: i===idx?blue:'rgba(255,255,255,0.2)', transition:'width 200ms ease' }}/>)}</div>
        </div>
      )}
    </div>
  );
};

/* ============================================================
   CANVAS ASSEMBLY
   ============================================================ */
const App = () => (
  <DesignCanvas background="#111122" gridColor="rgba(255,255,255,0.03)">

    <DCSection id="linkedin" title="LinkedIn — 1200×627 landscape / 1200×1200 square">
      <DCArtboard id="li-quote-dark" label="Quote · dark" width={1200} height={627}><QuoteCard w={1200} h={627} dark /></DCArtboard>
      <DCArtboard id="li-kpi-dark" label="KPI · dark" width={1200} height={627}><KpiCard w={1200} h={627} dark /></DCArtboard>
      <DCArtboard id="li-launch" label="Launch · dark" width={1200} height={627}><LaunchCard w={1200} h={627} dark /></DCArtboard>
      <DCArtboard id="li-sq-kpi" label="KPI · square" width={1200} height={1200}><KpiCard w={1200} h={1200} dark /></DCArtboard>
      <DCArtboard id="li-sq-quote" label="Quote · light sq" width={1200} height={1200}><QuoteCard w={1200} h={1200} /></DCArtboard>
    </DCSection>

    <DCSection id="substack" title="Substack / Medium — 1200×627 cover">
      <DCArtboard id="sub-launch" label="Launch cover" width={1200} height={627}><LaunchCard w={1200} h={627} dark /></DCArtboard>
      <DCArtboard id="sub-kpi" label="KPI cover" width={1200} height={627}><KpiCard w={1200} h={627} dark /></DCArtboard>
      <DCArtboard id="sub-quote-light" label="Quote · light" width={1200} height={627}><QuoteCard w={1200} h={627} /></DCArtboard>
    </DCSection>

    <DCSection id="instagram" title="Instagram — 1080×1080 square / 1080×1350 portrait">
      <DCArtboard id="ig-quote" label="Quote · square" width={1080} height={1080}><QuoteCard w={1080} h={1080} dark /></DCArtboard>
      <DCArtboard id="ig-kpi" label="KPI · portrait" width={1080} height={1350}><KpiCard w={1080} h={1350} dark /></DCArtboard>
      <DCArtboard id="ig-launch" label="Launch · square" width={1080} height={1080}><LaunchCard w={1080} h={1080} dark /></DCArtboard>
    </DCSection>

    <DCSection id="stories" title="Stories / TikTok / Reels — 1080×1920">
      <DCArtboard id="story-kpi" label="KPI story" width={1080} height={1920}><KpiCard w={1080} h={1920} dark /></DCArtboard>
      <DCArtboard id="story-launch" label="Launch story" width={1080} height={1920}><LaunchCard w={1080} h={1920} dark /></DCArtboard>
      <DCArtboard id="story-quote" label="Quote story" width={1080} height={1920}><QuoteCard w={1080} h={1920} dark /></DCArtboard>
    </DCSection>

    <DCSection id="carousel" title="Carousel — clickable, 1200×1200">
      <DCArtboard id="carousel-1" label="Carousel (click to advance)" width={1200} height={1200}><Carousel w={1200} h={1200} /></DCArtboard>
    </DCSection>

  </DesignCanvas>
);

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
