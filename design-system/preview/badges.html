<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body>
<div class="card">
  <div class="tagline-tiny" style="margin-bottom:14px;">Badges · status pills</div>
  <div style="display:flex; gap:8px; flex-wrap:wrap; align-items:center;">
    <span style="display:inline-flex; align-items:center; gap:6px; font-family:var(--font-body); font-weight:500; font-size:12px; padding:4px 10px; border-radius:9999px; background:#EFF4FF; color:#0C02AD;"><span style="width:6px; height:6px; border-radius:50%; background:#0C02AD;"></span>In progress</span>
    <span style="display:inline-flex; align-items:center; gap:6px; font-family:var(--font-body); font-weight:500; font-size:12px; padding:4px 10px; border-radius:9999px; background:#D3F8DF; color:#054F31;"><span style="width:6px; height:6px; border-radius:50%; background:#12B76A;"></span>Live</span>
    <span style="display:inline-flex; align-items:center; gap:6px; font-family:var(--font-body); font-weight:500; font-size:12px; padding:4px 10px; border-radius:9999px; background:#FEF0C7; color:#7A2E0E;"><span style="width:6px; height:6px; border-radius:50%; background:#FEC84B;"></span>At risk</span>
    <span style="display:inline-flex; align-items:center; gap:6px; font-family:var(--font-body); font-weight:500; font-size:12px; padding:4px 10px; border-radius:9999px; background:#FEE4E2; color:#7A271A;"><span style="width:6px; height:6px; border-radius:50%; background:#F04438;"></span>Off course</span>
    <span style="display:inline-flex; align-items:center; gap:6px; font-family:var(--font-body); font-weight:500; font-size:12px; padding:4px 10px; border-radius:9999px; background:#F4F4F4; color:#344054;"><span style="width:6px; height:6px; border-radius:50%; background:#98A2B3;"></span>Archived</span>
    <span style="display:inline-flex; align-items:center; gap:6px; font-family:var(--font-body); font-weight:500; font-size:12px; padding:4px 10px; border-radius:9999px; background:#F4EBFF; color:#5B1AB8;"><span style="width:6px; height:6px; border-radius:50%; background:#9747FF;"></span>Beta</span>
  </div>
</div>
</body></html>
