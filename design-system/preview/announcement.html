<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body>
<div class="card">
  <div class="tagline-tiny" style="margin-bottom:14px;">Announcement modal · vetted</div>
  <div style="background:#F4F4F4; padding:18px; border-radius:10px; display:flex; justify-content:center;">
    <div style="width:380px; background:#fff; border-radius:10px; box-shadow:0 4px 20px rgba(0,0,0,0.1); padding:28px; position:relative; text-align:center;">
      <button aria-label="Close" style="position:absolute; top:10px; right:12px; background:none; border:none; cursor:pointer; padding:4px;">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#344054" stroke-width="2" stroke-linecap="round"><path d="M18 6 6 18M6 6l12 12"/></svg>
      </button>
      <div style="font-family:var(--font-display); font-weight:700; font-size:18px; color:#15161A; margin-bottom:4px;">You're on the right side</div>
      <div style="font-family:var(--font-body); font-size:13px; color:#344054; line-height:1.5; margin-bottom:14px;">Welcome to Admiral. Take a quick tour to learn how Starboard guides every navigation decision.</div>
      <div style="height:120px; background:linear-gradient(180deg, #00050F 0%, #002772 50%, #2C004F 100%); border-radius:10px; margin-bottom:14px;"></div>
      <div style="display:flex; justify-content:center; gap:6px; margin-bottom:14px;">
        <span style="width:8px; height:8px; border-radius:50%; background:#0D00FF;"></span>
        <span style="width:8px; height:8px; border-radius:50%; background:#D8DADF;"></span>
        <span style="width:8px; height:8px; border-radius:50%; background:#D8DADF;"></span>
      </div>
      <div style="display:flex; gap:8px;">
        <button style="flex:1; font-family:var(--font-display); font-weight:500; font-size:14px; color:#0D00FF; background:#fff; border:1px solid #0D00FF; border-radius:10px; padding:10px;">Skip</button>
        <button style="flex:1; font-family:var(--font-display); font-weight:500; font-size:14px; color:#fff; background:linear-gradient(180deg, #3360FF 0%, #0A00CC 100%); border:none; border-radius:10px; padding:10px;">Take the tour</button>
      </div>
    </div>
  </div>
</div>
</body></html>
