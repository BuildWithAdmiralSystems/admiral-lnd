<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body>
<div class="card">
  <div class="tagline-tiny" style="margin-bottom:8px;">Neutral scale · 50 → 900</div>
  <div style="display:grid; grid-template-columns: repeat(10,1fr); gap:0;">
    <div style="height:84px; background:#FCFCFD; display:flex; align-items:flex-end; padding:6px; font-family:var(--font-mono); font-size:10px; color:#142853;">50</div>
    <div style="height:84px; background:#F4F4F4; display:flex; align-items:flex-end; padding:6px; font-family:var(--font-mono); font-size:10px; color:#142853;">100</div>
    <div style="height:84px; background:#E8EAED; display:flex; align-items:flex-end; padding:6px; font-family:var(--font-mono); font-size:10px; color:#142853;">200</div>
    <div style="height:84px; background:#D8DADF; display:flex; align-items:flex-end; padding:6px; font-family:var(--font-mono); font-size:10px; color:#142853;">300</div>
    <div style="height:84px; background:#D0D5DD; display:flex; align-items:flex-end; padding:6px; font-family:var(--font-mono); font-size:10px; color:#142853;">400</div>
    <div style="height:84px; background:#98A2B3; display:flex; align-items:flex-end; padding:6px; font-family:var(--font-mono); font-size:10px; color:#fff;">500</div>
    <div style="height:84px; background:#475467; display:flex; align-items:flex-end; padding:6px; font-family:var(--font-mono); font-size:10px; color:#fff;">600</div>
    <div style="height:84px; background:#344054; display:flex; align-items:flex-end; padding:6px; font-family:var(--font-mono); font-size:10px; color:#fff;">700</div>
    <div style="height:84px; background:#292932; display:flex; align-items:flex-end; padding:6px; font-family:var(--font-mono); font-size:10px; color:#fff;">800</div>
    <div style="height:84px; background:#0E0F11; display:flex; align-items:flex-end; padding:6px; font-family:var(--font-mono); font-size:10px; color:#fff;">900</div>
  </div>
</div>
</body></html>
