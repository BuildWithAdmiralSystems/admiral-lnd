<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body>
<div class="card">
  <div style="display:grid; grid-template-columns: repeat(5,1fr); gap:8px;">
    <!-- 5 brand colors -->
    <div style="display:flex; flex-direction:column;">
      <div style="height:96px; background:#142853; border-radius: var(--radius-sm) var(--radius-sm) 0 0;"></div>
      <div style="padding:8px 10px; background:#FFF; border:1px solid var(--border-subtle); border-top:none; border-radius:0 0 var(--radius-sm) var(--radius-sm);">
        <div style="font-weight:600; font-size:13px; color:var(--fg-strong);">navy</div>
        <div style="font-family:var(--font-mono); font-size:11px; color:var(--fg-muted);">#142853</div>
      </div>
    </div>
    <div style="display:flex; flex-direction:column;">
      <div style="height:96px; background:#030033; border-radius: var(--radius-sm) var(--radius-sm) 0 0;"></div>
      <div style="padding:8px 10px; background:#FFF; border:1px solid var(--border-subtle); border-top:none; border-radius:0 0 var(--radius-sm) var(--radius-sm);">
        <div style="font-weight:600; font-size:13px; color:var(--fg-strong);">navy-black</div>
        <div style="font-family:var(--font-mono); font-size:11px; color:var(--fg-muted);">#030033</div>
      </div>
    </div>
    <div style="display:flex; flex-direction:column;">
      <div style="height:96px; background:#3360FF; border-radius: var(--radius-sm) var(--radius-sm) 0 0;"></div>
      <div style="padding:8px 10px; background:#FFF; border:1px solid var(--border-subtle); border-top:none; border-radius:0 0 var(--radius-sm) var(--radius-sm);">
        <div style="font-weight:600; font-size:13px; color:var(--fg-strong);">blue</div>
        <div style="font-family:var(--font-mono); font-size:11px; color:var(--fg-muted);">#3360FF</div>
      </div>
    </div>
    <div style="display:flex; flex-direction:column;">
      <div style="height:96px; background:#0D00FF; border-radius: var(--radius-sm) var(--radius-sm) 0 0;"></div>
      <div style="padding:8px 10px; background:#FFF; border:1px solid var(--border-subtle); border-top:none; border-radius:0 0 var(--radius-sm) var(--radius-sm);">
        <div style="font-weight:600; font-size:13px; color:var(--fg-strong);">indigo</div>
        <div style="font-family:var(--font-mono); font-size:11px; color:var(--fg-muted);">#0D00FF</div>
      </div>
    </div>
    <div style="display:flex; flex-direction:column;">
      <div style="height:96px; background:#FEC84B; border-radius: var(--radius-sm) var(--radius-sm) 0 0;"></div>
      <div style="padding:8px 10px; background:#FFF; border:1px solid var(--border-subtle); border-top:none; border-radius:0 0 var(--radius-sm) var(--radius-sm);">
        <div style="font-weight:600; font-size:13px; color:var(--fg-strong);">amber</div>
        <div style="font-family:var(--font-mono); font-size:11px; color:var(--fg-muted);">#FEC84B</div>
      </div>
    </div>
  </div>
</div>
</body></html>
