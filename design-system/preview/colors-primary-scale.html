<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body>
<div class="card">
  <div class="tagline-tiny" style="margin-bottom:8px;">Primary scale · 50 → 900</div>
  <div style="display:grid; grid-template-columns: repeat(10,1fr); gap:0;">
    <div style="height:84px; background:#EFF4FF; display:flex; align-items:flex-end; padding:6px; font-family:var(--font-mono); font-size:10px; color:#142853;">50</div>
    <div style="height:84px; background:#D6E3FF; display:flex; align-items:flex-end; padding:6px; font-family:var(--font-mono); font-size:10px; color:#142853;">100</div>
    <div style="height:84px; background:#B9D9F4; display:flex; align-items:flex-end; padding:6px; font-family:var(--font-mono); font-size:10px; color:#142853;">200</div>
    <div style="height:84px; background:#8AB3F0; display:flex; align-items:flex-end; padding:6px; font-family:var(--font-mono); font-size:10px; color:#142853;">300</div>
    <div style="height:84px; background:#5B8DEC; display:flex; align-items:flex-end; padding:6px; font-family:var(--font-mono); font-size:10px; color:#fff;">400</div>
    <div style="height:84px; background:#3360FF; display:flex; align-items:flex-end; padding:6px; font-family:var(--font-mono); font-size:10px; color:#fff;">500</div>
    <div style="height:84px; background:#0038FF; display:flex; align-items:flex-end; padding:6px; font-family:var(--font-mono); font-size:10px; color:#fff;">600</div>
    <div style="height:84px; background:#004EEB; display:flex; align-items:flex-end; padding:6px; font-family:var(--font-mono); font-size:10px; color:#fff;">700</div>
    <div style="height:84px; background:#0C02AD; display:flex; align-items:flex-end; padding:6px; font-family:var(--font-mono); font-size:10px; color:#fff;">800</div>
    <div style="height:84px; background:#050066; display:flex; align-items:flex-end; padding:6px; font-family:var(--font-mono); font-size:10px; color:#fff;">900</div>
  </div>
</div>
</body></html>
