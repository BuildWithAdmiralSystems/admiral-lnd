<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body>
<div class="card">
  <div class="tagline-tiny" style="margin-bottom:8px;">Semantic · success · warning · error · tertiary (violet)</div>
  <div style="display:grid; grid-template-columns: repeat(4,1fr); gap:12px;">
    <div>
      <div style="display:flex;">
        <div style="flex:1; height:48px; background:#D3F8DF;"></div>
        <div style="flex:1; height:48px; background:#12B76A;"></div>
        <div style="flex:1; height:48px; background:#054F31;"></div>
      </div>
      <div style="font-weight:600; font-size:13px; color:var(--fg-strong); margin-top:6px;">Success</div>
      <div style="font-family:var(--font-mono); font-size:10px; color:var(--fg-muted);">100 · 500 · 900</div>
    </div>
    <div>
      <div style="display:flex;">
        <div style="flex:1; height:48px; background:#FEF0C7;"></div>
        <div style="flex:1; height:48px; background:#FEC84B;"></div>
        <div style="flex:1; height:48px; background:#7A2E0E;"></div>
      </div>
      <div style="font-weight:600; font-size:13px; color:var(--fg-strong); margin-top:6px;">Warning</div>
      <div style="font-family:var(--font-mono); font-size:10px; color:var(--fg-muted);">100 · 500 · 900</div>
    </div>
    <div>
      <div style="display:flex;">
        <div style="flex:1; height:48px; background:#FEE4E2;"></div>
        <div style="flex:1; height:48px; background:#F04438;"></div>
        <div style="flex:1; height:48px; background:#7A271A;"></div>
      </div>
      <div style="font-weight:600; font-size:13px; color:var(--fg-strong); margin-top:6px;">Error</div>
      <div style="font-family:var(--font-mono); font-size:10px; color:var(--fg-muted);">100 · 500 · 900</div>
    </div>
    <div>
      <div style="display:flex;">
        <div style="flex:1; height:48px; background:#F4EBFF;"></div>
        <div style="flex:1; height:48px; background:#9747FF;"></div>
        <div style="flex:1; height:48px; background:#5B1AB8;"></div>
      </div>
      <div style="font-weight:600; font-size:13px; color:var(--fg-strong); margin-top:6px;">Tertiary</div>
      <div style="font-family:var(--font-mono); font-size:10px; color:var(--fg-muted);">100 · 500 · 700</div>
    </div>
  </div>
</div>
</body></html>
