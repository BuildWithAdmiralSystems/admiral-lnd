<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body>
<div class="card" style="background:#F4F4F4;">
  <div class="tagline-tiny" style="margin-bottom:14px;">Shadows · xs · sm · md · lg · xl · 2xl · modal</div>
  <div style="display:grid; grid-template-columns: repeat(7, 1fr); gap:14px;">
    <div style="text-align:center;"><div style="height:64px; background:#fff; border-radius:8px; box-shadow:0px 1px 2px rgba(0,0,0,0.05);"></div><div style="font-family:var(--font-mono); font-size:10px; margin-top:8px; color:var(--fg-muted);">xs</div></div>
    <div style="text-align:center;"><div style="height:64px; background:#fff; border-radius:8px; box-shadow:0px 1px 3px rgba(0,0,0,0.1),0 1px 2px rgba(0,0,0,0.06);"></div><div style="font-family:var(--font-mono); font-size:10px; margin-top:8px; color:var(--fg-muted);">sm</div></div>
    <div style="text-align:center;"><div style="height:64px; background:#fff; border-radius:8px; box-shadow:0px 4px 8px -2px rgba(0,0,0,0.1),0 2px 4px -2px rgba(0,0,0,0.06);"></div><div style="font-family:var(--font-mono); font-size:10px; margin-top:8px; color:var(--fg-muted);">md</div></div>
    <div style="text-align:center;"><div style="height:64px; background:#fff; border-radius:8px; box-shadow:0px 12px 16px -4px rgba(0,0,0,0.08),0 4px 6px -2px rgba(0,0,0,0.03);"></div><div style="font-family:var(--font-mono); font-size:10px; margin-top:8px; color:var(--fg-muted);">lg</div></div>
    <div style="text-align:center;"><div style="height:64px; background:#fff; border-radius:8px; box-shadow:0px 20px 24px -4px rgba(0,0,0,0.08),0 8px 8px -4px rgba(0,0,0,0.03);"></div><div style="font-family:var(--font-mono); font-size:10px; margin-top:8px; color:var(--fg-muted);">xl</div></div>
    <div style="text-align:center;"><div style="height:64px; background:#fff; border-radius:8px; box-shadow:0px 25px 50px -12px rgba(0,0,0,0.25);"></div><div style="font-family:var(--font-mono); font-size:10px; margin-top:8px; color:var(--fg-muted);">2xl</div></div>
    <div style="text-align:center;"><div style="height:64px; background:#fff; border-radius:8px; box-shadow:0px 4px 20px rgba(0,0,0,0.1);"></div><div style="font-family:var(--font-mono); font-size:10px; margin-top:8px; color:var(--fg-muted);">modal</div></div>
  </div>
</div>
</body></html>
