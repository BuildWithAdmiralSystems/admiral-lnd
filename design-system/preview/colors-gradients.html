<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_card.css"></head>
<body>
<div class="card">
  <div class="tagline-tiny" style="margin-bottom:10px;">Brand gradients</div>
  <div style="display:grid; grid-template-columns: 1fr 1fr; gap:14px;">
    <div>
      <div style="height:120px; background: linear-gradient(180deg, #3360FF 0%, #0A00CC 100%); border-radius: var(--radius-md);"></div>
      <div style="font-weight:600; font-size:13px; color:var(--fg-strong); margin-top:6px;">Primary action</div>
      <div style="font-family:var(--font-mono); font-size:10px; color:var(--fg-muted);">--admiral-gradient-primary</div>
    </div>
    <div>
      <div style="height:120px; background: linear-gradient(180deg, #00050F 0%, #002772 50%, #2C004F 100%); border-radius: var(--radius-md);"></div>
      <div style="font-weight:600; font-size:13px; color:var(--fg-strong); margin-top:6px;">Hero / dark sections</div>
      <div style="font-family:var(--font-mono); font-size:10px; color:var(--fg-muted);">--admiral-gradient-hero</div>
    </div>
  </div>
</div>
</body></html>
