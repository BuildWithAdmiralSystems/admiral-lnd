<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Admiral · Announcement / Modals (vetted)</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="root"></div>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script type="text/babel" src="Announcement.jsx"></script>
  <script type="text/babel" src="Dialog.jsx"></script>
  <script type="text/babel">
    const App = () => {
      const [step, setStep] = React.useState(0);
      const advance = () => setStep((step + 1) % 5);

      return (
        <div className="ad-stage">
          <div className="ad-stage__col">
            <h3>Announcement · light</h3>
            <p>Default 430-wide modal. White surface, modal shadow, 32px padding, 250-tall image area, 5-dot pagination, Primary + Secondary stack.</p>
            <div className="ad-stage__shadow">
              <Announcement
                title="You're on the right side"
                body="Welcome to Admiral. Take a quick tour to learn how Starboard guides every navigation decision."
                primary="Take the tour"
                secondary="Skip"
                step={step}
                onPrimary={advance}
                onSecondary={advance}
              />
            </div>
          </div>

          <div className="ad-stage__col">
            <h3>Announcement · dark (Alternate)</h3>
            <p>Same shape, navy-black surface for high-contrast moments — onboarding finales, brand-led launches.</p>
            <div className="ad-stage__shadow">
              <Announcement
                variant="dark"
                title="One last thing"
                body="You can pin the Voyages dashboard to your sidebar. Press ⌘⇧P from anywhere to bring it back."
                primary="Pin it"
                secondary="Maybe later"
                step={4}
              />
            </div>
          </div>

          <div className="ad-stage__col">
            <h3>Dialog · default</h3>
            <p>Compact 480-wide dialog for confirmations and follow-up flows. Icon top-left, right-aligned actions.</p>
            <div className="ad-stage__shadow">
              <Dialog
                title="Invite teammates to Starboard"
                body="They'll see the components and tokens you've published. They won't see drafts unless you share them."
                primary="Send invites"
                secondary="Cancel"
                icon={<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"><circle cx="9" cy="8" r="3"/><path d="M3 20a6 6 0 0 1 12 0"/><path d="M19 8v6M16 11h6"/></svg>}
              />
            </div>
          </div>

          <div className="ad-stage__col">
            <h3>Dialog · destructive</h3>
            <p>Same dialog with danger variant. Use for irreversible actions — delete, archive, revoke.</p>
            <div className="ad-stage__shadow">
              <Dialog
                danger
                title="Delete voyage V-2038?"
                body="The voyage record and its incident history will be removed. Crew assignments stay attached to MV Hailstorm."
                primary="Delete voyage"
                secondary="Keep it"
                icon={<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"><path d="M3 6h18M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2m3 0v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6"/></svg>}
              />
            </div>
          </div>
        </div>
      );
    };
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
