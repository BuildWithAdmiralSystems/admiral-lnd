<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Admiral · App kit</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="root"></div>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script type="text/babel" src="Sidebar.jsx"></script>
  <script type="text/babel" src="Topbar.jsx"></script>
  <script type="text/babel" src="PageHeader.jsx"></script>
  <script type="text/babel" src="StatCards.jsx"></script>
  <script type="text/babel" src="Table.jsx"></script>
  <script type="text/babel">
    const ROWS = [
      { id: 'V-2041', name: 'Atlantic Crest 12 → BCN', vessel: 'MV Northstar', captain: 'Lin Park',     initials: 'LP', status: 'In transit', statusKey: 'progress', eta: 'Tue 14:20', updated: '6m ago' },
      { id: 'V-2040', name: 'Pacific Brace 03 → SEA',  vessel: 'MV Borealis',  captain: 'Marek Vance',  initials: 'MV', status: 'On schedule',statusKey: 'live',     eta: 'Wed 09:55', updated: '14m ago'},
      { id: 'V-2039', name: 'Mediterranean Sweep',     vessel: 'MV Tideway',   captain: 'Olu Bankole',  initials: 'OB', status: 'At risk',    statusKey: 'risk',     eta: 'Mon 22:10', updated: '1h ago' },
      { id: 'V-2038', name: 'North Sea Loop',          vessel: 'MV Hailstorm', captain: 'Sera Chen',    initials: 'SC', status: 'Off course', statusKey: 'off',      eta: '— recalculating', updated: '2h ago' },
      { id: 'V-2037', name: 'Indian Ocean Run',        vessel: 'MV Kestrel',   captain: 'Diego Marín',  initials: 'DM', status: 'In transit', statusKey: 'progress', eta: 'Fri 04:30', updated: '5h ago' },
      { id: 'V-2036', name: 'Baltic Express',          vessel: 'MV Linden',    captain: 'Hana Sato',    initials: 'HS', status: 'Completed',  statusKey: 'done',     eta: 'Delivered Tue', updated: '1d ago' },
    ];

    const App = () => {
      const [active, setActive] = React.useState('voyages');
      const [drawerOpen, setDrawerOpen] = React.useState(false);

      // close drawer when viewport widens
      React.useEffect(() => {
        const onResize = () => { if (window.innerWidth > 720) setDrawerOpen(false); };
        window.addEventListener('resize', onResize);
        return () => window.removeEventListener('resize', onResize);
      }, []);

      return (
        <div className={`ad-app is-rail ${drawerOpen ? 'is-drawer-open' : ''}`}>
          <div className="ad-scrim" onClick={() => setDrawerOpen(false)}></div>
          <Sidebar active={active} onSelect={(k) => { setActive(k); setDrawerOpen(false); }} />
          <div className="ad-app__main" data-screen-label="01 Voyages dashboard">
            <Topbar crumbs={['Workspace', 'Voyages', 'All']} onMenu={() => setDrawerOpen(true)} />
            <div className="ad-page">
              <PageHeader title="Voyages" sub="Track every active route in the fleet, in real time." />
              <StatCards />
              <Table rows={ROWS} />
            </div>
          </div>
        </div>
      );
    };
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
